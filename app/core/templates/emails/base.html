<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ subject }}</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background-color: #f7f8fa;
      color: #1a1a1a;
      line-height: 1.6;
      padding: 20px 10px;
    }

    .email-wrapper {
      max-width: 600px;
      margin: 0 auto;
      background-color: #ffffff;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #0052CC 0%, #0041A8 100%);
      color: #ffffff;
      text-align: center;
      padding: 40px 25px;
    }

    .header h1 {
      margin: 0 0 8px 0;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .header p {
      margin: 0;
      font-size: 14px;
      opacity: 0.9;
    }

    .content {
      padding: 40px 30px;
      color: #333333;
    }

    .content h2 {
      color: #1a1a1a;
      margin-bottom: 16px;
      font-size: 22px;
    }

    .content p {
      margin-bottom: 16px;
      font-size: 15px;
      line-height: 1.7;
    }

    .cta-button {
      display: inline-block;
      margin-top: 20px;
      padding: 14px 32px;
      background-color: #0052CC;
      color: #ffffff !important;
      text-decoration: none;
      border-radius: 6px;
      font-weight: 600;
      font-size: 16px;
      transition: background-color 0.2s ease;
      box-shadow: 0 2px 4px rgba(0, 82, 204, 0.2);
    }

    .cta-button:hover {
      background-color: #0041A8;
    }

    .footer {
      text-align: center;
      padding: 30px 25px;
      background-color: #f8f9fb;
      font-size: 13px;
      color: #666666;
      border-top: 1px solid #e5e7eb;
    }

    .footer p {
      margin: 8px 0;
    }

    .footer a {
      color: #0052CC;
      text-decoration: none;
      font-weight: 500;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    .social-links {
      margin-top: 20px;
    }

    .social-links a {
      display: inline-block;
      margin: 0 8px;
      transition: transform 0.2s ease;
    }

    .social-links a:hover {
      transform: translateY(-2px);
    }

    .social-links img {
      width: 28px;
      height: 28px;
      border-radius: 4px;
    }

    /* Mobile optimization */
    @media only screen and (max-width: 600px) {
      .email-wrapper {
        border-radius: 0;
        box-shadow: none;
      }

      .header {
        padding: 30px 20px;
      }

      .header h1 {
        font-size: 24px;
      }

      .content {
        padding: 30px 20px;
      }

      .cta-button {
        display: block;
        text-align: center;
        padding: 16px 24px;
      }

      .footer {
        padding: 25px 20px;
      }
    }
  </style>
</head>
<body>
  <div class="email-wrapper">

    <div class="header">
      <h1>TeamIQ</h1>
      <p>Your workspace powered by iSentry Technologies</p>
    </div>

    <div class="content">
      {% block content %}{% endblock %}
    </div>

    <div class="footer">
      <p>&copy; {{ current_year }} TeamIQ by iSentry Technologies. All rights reserved.</p>

      <div class="social-links">

        <a href="https://www.linkedin.com/company/isentry-technologies/"
           aria-label="LinkedIn"
           target="_blank"
           rel="noopener">
          <img src="https://cdn-icons-png.flaticon.com/512/145/145807.png" alt="LinkedIn">
        </a>

        <a href="https://x.com/ISentryTech"
           aria-label="X (Twitter)"
           target="_blank"
           rel="noopener">
          <img src="https://cdn-icons-png.flaticon.com/512/5968/5968830.png" alt="X">
        </a>


        <a href="mailto:support@isentrytechnologies.com"
           aria-label="Email"
           target="_blank">
          <img src="https://cdn-icons-png.flaticon.com/512/732/732200.png" alt="Email">
        </a>
      </div>

      <p style="margin-top: 20px; font-size: 12px; color: #999;">
        If you have any questions, contact us at
        <a href="mailto:support@isentrytechnologies.com">support@isentrytechnologies.com</a>
      </p>
    </div>
  </div>
</body>
</html>
